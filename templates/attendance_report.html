<!-- templates/attendance_report.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Attendance Report</title>

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(120deg, #f0f4f8, #d9e4f5);
            margin: 0;
            padding: 0;
        }

        .report-btn {
        display: inline-block;
        background: linear-gradient(135deg, #4CAF50, #2E8B57);
        color: white;
        padding: 12px 24px;
        font-size: 16px;
        font-weight: bold;
        border-radius: 30px;
        text-decoration: none;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        transition: all 0.3s ease;
    }

    .report-btn:hover {
        background: linear-gradient(135deg, #45a049, #1f6f4a);
        transform: translateY(-3px) scale(1.05);
        box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
    }

    .report-btn:active {
        transform: scale(0.97);
    }
        h2 {
            padding: 20px;
            color: #2c3e50;
        }
        .chart-container {
            width: 80%;
            max-width: 900px;
            margin: auto;
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            animation: fadeIn 1s ease-in-out;
        }
        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>
<body>
    <h2>📊 Attendance Report</h2>

    <div class="chart-container">
        <canvas id="attendanceChart"></canvas>
    </div>

    <script>
    const dates = JSON.parse('{{ dates | tojson | safe }}');
    const counts = JSON.parse('{{ counts | tojson | safe }}');

    const ctx = document.getElementById('attendanceChart').getContext('2d');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: dates,
            datasets: [{
                label: 'Attendance Count',
                data: counts,
                backgroundColor: 'rgba(54, 162, 235, 0.5)',
                borderColor: 'rgba(54, 162, 235, 1)',
                borderWidth: 2
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: true },
                tooltip: { enabled: true }
            },
            scales: {
                y: { beginAtZero: true }
            }
        }
    });
</script>


    
</body>
</html>
