<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Role</title>
    <style>
    body {
        font-family: Arial, sans-serif;
        background-image: url("{{ url_for('static', filename='images/role_bg.jpg') }}");

        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        margin: 0;
        padding: 0;
        color: white;
        text-align: center;
    }

    h1 {
        margin-top: 50px;
        font-size: 40px;
        text-shadow: 2px 2px 6px rgba(0,0,0,0.8);
    }

    .role-container {
        margin-top: 80px;
        display: flex;
        justify-content: center;
        gap: 40px;
        flex-wrap: wrap;
    }

    .role-box {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(8px);
        color: #fff;
        width: 250px;
        padding: 30px;
        border-radius: 16px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        transition: 0.3s;
    }

    .role-box:hover {
        transform: translateY(-10px);
    }

    button {
        padding: 12px 22px;
        margin-top: 15px;
        border: none;
        border-radius: 8px;
        background: #2575fc;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #0f4dcc;
    }

    footer {
        margin-top: 50px;
        color: white;
        font-size: 14px;
        text-shadow: 1px 1px 5px rgba(0,0,0,0.7);
    }
</style>

</head>
<body>

    <h1>Select Your Role</h1>

    <div class="role-container">
        <div class="role-box">
            <h2>Student</h2>
            <p>Access student features</p>
            <a href="/role/student"><button>Enter as Student</button></a>
        </div>

        <div class="role-box">
            <h2>Teacher</h2>
            <p>Access teacher features</p>
            <a href="/role/teacher"><button>Enter as Teacher</button></a>
        </div>

        
    </div>

    <footer>
        © Smart Attendance System | Made by Naeem Shaikh
    </footer>

</body>
</html>
