<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Attendance</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; }
    .container { display: flex; height: 100vh; overflow: hidden; }
    .left-panel { flex: 1; background-color: #f0f0f0; }
    .left-panel img { width: 100%; height: 100%; object-fit: cover; }
    .right-panel { flex: 1; background: #ffffff; padding: 40px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .right-panel h2 { font-size: 32px; margin-bottom: 30px; color: #2c3e50; }
    .right-panel video, canvas { width: 100%; max-width: 380px; margin-bottom: 20px; border-radius: 6px; border: 1px solid #ccc; }
    .right-panel button { padding: 12px 20px; background-color: #6c5ce7; color: white; font-size: 16px; border: none; border-radius: 6px; cursor: pointer; }
    .right-panel button:hover { background-color: #5a4dcf; }
  </style>
</head>
<body>
  <div class="container">
    <div class="left-panel">
      <img src="{{ url_for('static', filename='images/student_illustration.png') }}" alt="Student Illustration">
    </div>
    <div class="right-panel">
      <h2>Student Attendance</h2>
      <form id="attendanceForm" method="POST" action="/student_login">
        <video id="video" autoplay></video><br>
        <canvas id="canvas" width="320" height="240" style="display:none;"></canvas>
        <input type="hidden" name="image" id="imageInput">
        <button type="button" onclick="capture()">Capture & Submit</button>
      </form>
      <a href="/register_student">New Student? Register here</a>
      <a href="/teacher_role_authenticate">End Attendance</a>
    </div>
  </div>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const context = canvas.getContext('2d');
    const imageInput = document.getElementById('imageInput');
    const form = document.getElementById('attendanceForm');

    navigator.mediaDevices.getUserMedia({ video: true })
      .then(stream => { video.srcObject = stream; })
      .catch(err => { console.error("Error accessing webcam: " + err); });

    function capture() {
      context.drawImage(video, 0, 0, canvas.width, canvas.height);
      const imageData = canvas.toDataURL('image/png');
      imageInput.value = imageData;
      form.submit();
    }
  </script>
</body>
</html>
